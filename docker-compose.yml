services:
  postgres:
    image: postgres:17-alpine
    container_name: nutrition-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nutrition_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-nutrition_tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local .env file.}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - nutrition_tracker_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nutrition_tracker_postgres_data:
